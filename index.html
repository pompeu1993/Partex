<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PARTEX — Marketplace de Autopeças e Serviços</title>
    <meta name="description" content="Encontre peças automotivas e serviços com os melhores preços. Cotações rápidas, vendedores próximos e pagamento seguro no PARTEX." />
    <meta name="theme-color" content="#F26522" />
    <link rel="canonical" href="/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PARTEX — Marketplace de Autopeças e Serviços" />
    <meta property="og:description" content="Compare preços de peças e serviços automotivos, receba cotações e compre com segurança." />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:url" content="/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PARTEX — Marketplace de Autopeças e Serviços" />
    <meta name="twitter:description" content="Cotações instantâneas, melhores ofertas e pagamento seguro." />
    <meta name="twitter:image" content="/favicon.svg" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "PARTEX",
        "url": "/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
